services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ../cyber-dashboard-api
    ports:
      - "8000:8000"
    environment:
      API_NAME: ${API_NAME}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      API_LOG_LEVEL: ${API_LOG_LEVEL}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build: ../cyber-dashboard-scheduler
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      LIMIT_REQUEST_PER_DAY: ${LIMIT_REQUEST_PER_DAY}
      LOG_LEVEL: ${LOG_LEVEL}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS}
      POLL_SAFETY_WINDOW_SECONDS: ${POLL_SAFETY_WINDOW_SECONDS}
      OGO_BASE_URL: ${OGO_BASE_URL}
      OGO_USERNAME: ${OGO_USERNAME}
      OGO_API_KEY: ${OGO_API_KEY}
      OGO_SITE_NAME_OR_ID: ${OGO_SITE_NAME_OR_ID}
      OGO_JOURNAL_PAGE_SIZE: ${OGO_JOURNAL_PAGE_SIZE}
      SERENICITY_BASE_URL: ${SERENICITY_BASE_URL}
      SERENICITY_API_KEY: ${SERENICITY_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  common-ip-correlator:
    build: ../cyber-dashboard-common-ip
    environment:
      CORRELATOR_DB_HOST: ${DB_HOST}
      CORRELATOR_DB_PORT: ${DB_PORT}
      CORRELATOR_DB_NAME: ${POSTGRES_DB}
      CORRELATOR_DB_USER: ${POSTGRES_USER}
      CORRELATOR_DB_PASSWORD: ${POSTGRES_PASSWORD}
      CORRELATOR_BATCH_SIZE: ${CORRELATOR_BATCH_SIZE}
      CORRELATOR_POLL_INTERVAL_SECONDS: ${CORRELATOR_POLL_INTERVAL_SECONDS}
      CORRELATOR_LOG_LEVEL: ${CORRELATOR_LOG_LEVEL}
      CORRELATOR_COMPUTE_AVERAGE_PROCESSING_TIME: ${CORRELATOR_COMPUTE_AVERAGE_PROCESSING_TIME}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ../cyber-dashboard-frontend
    depends_on:
      - api

  reverse-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  db_data: {}
